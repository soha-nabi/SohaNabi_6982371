<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise 15.1 - Borders Image</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-5">
        <h1 class="mb-4">Exercise 15.1: Border Utilities</h1>
        
        <h5 class="mt-4 mb-3">Border Styles</h5>
        <div class="row">
            <div class="col-md-4 mb-4">
                <img src="https://via.placeholder.com/200x150" class="border p-2" alt="Border">
                <p class="mt-2"><small>border</small></p>
            </div>
            <div class="col-md-4 mb-4">
                <img src="https://via.placeholder.com/200x150" class="border border-3 p-2" alt="Border 3">
                <p class="mt-2"><small>border border-3</small></p>
            </div>
            <div class="col-md-4 mb-4">
                <img src="https://via.placeholder.com/200x150" class="border border-5 p-2" alt="Border 5">
                <p class="mt-2"><small>border border-5</small></p>
            </div>
        </div>

        <h5 class="mt-4 mb-3">Border Colors</h5>
        <div class="row">
            <div class="col-md-4 mb-4">
                <img src="https://via.placeholder.com/200x150" class="border border-primary border-3 p-2" alt="Primary">
                <p class="mt-2"><small>border-primary</small></p>
            </div>
            <div class="col-md-4 mb-4">
                <img src="https://via.placeholder.com/200x150" class="border border-success border-3 p-2" alt="Success">
                <p class="mt-2"><small>border-success</small></p>
            </div>
            <div class="col-md-4 mb-4">
                <img src="https://via.placeholder.com/200x150" class="border border-danger border-3 p-2" alt="Danger">
                <p class="mt-2"><small>border-danger</small></p>
            </div>
        </div>

        <h5 class="mt-4 mb-3">Rounded Corners</h5>
        <div class="row">
            <div class="col-md-4 mb-4">
                <img src="https://via.placeholder.com/200x150" class="rounded" alt="Rounded">
                <p class="mt-2"><small>rounded</small></p>
            </div>
            <div class="col-md-4 mb-4">
                <img src="https://via.placeholder.com/200x150" class="rounded-pill" alt="Rounded pill">
                <p class="mt-2"><small>rounded-pill</small></p>
            </div>
            <div class="col-md-4 mb-4">
                <img src="https://via.placeholder.com/200x150" class="rounded-circle" alt="Rounded circle">
                <p class="mt-2"><small>rounded-circle</small></p>
            </div>
        </div>

        <h5 class="mt-4 mb-3">Individual Sides</h5>
        <div class="row">
            <div class="col-md-3 mb-4">
                <img src="https://via.placeholder.com/150x150" class="border-top border-3 border-primary p-2" alt="Top border">
                <p class="mt-2"><small>border-top</small></p>
            </div>
            <div class="col-md-3 mb-4">
                <img src="https://via.placeholder.com/150x150" class="border-end border-3 border-success p-2" alt="End border">
                <p class="mt-2"><small>border-end</small></p>
            </div>
            <div class="col-md-3 mb-4">
                <img src="https://via.placeholder.com/150x150" class="border-bottom border-3 border-danger p-2" alt="Bottom border">
                <p class="mt-2"><small>border-bottom</small></p>
            </div>
            <div class="col-md-3 mb-4">
                <img src="https://via.placeholder.com/150x150" class="border-start border-3 border-warning p-2" alt="Start border">
                <p class="mt-2"><small>border-start</small></p>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
