<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise 16.2 - Badge Overlay</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-5">
        <h1 class="mb-4">Exercise 16.2: Badge Overlay Positioning</h1>
        
        <h5 class="mt-4 mb-3">Product Cards with Badge Overlay</h5>
        <div class="row">
            <div class="col-md-4 mb-4">
                <div class="position-relative">
                    <img src="https://via.placeholder.com/300x200" class="img-fluid rounded" alt="Product 1">
                    <span class="position-absolute top-0 start-0 badge bg-danger m-2">Hot Deal</span>
                </div>
                <h6 class="mt-3">Product 1</h6>
                <p class="text-muted">$49.99</p>
            </div>

            <div class="col-md-4 mb-4">
                <div class="position-relative">
                    <img src="https://via.placeholder.com/300x200" class="img-fluid rounded" alt="Product 2">
                    <span class="position-absolute top-50 start-50 translate-middle badge bg-success">New</span>
                </div>
                <h6 class="mt-3">Product 2</h6>
                <p class="text-muted">$59.99</p>
            </div>

            <div class="col-md-4 mb-4">
                <div class="position-relative">
                    <img src="https://via.placeholder.com/300x200" class="img-fluid rounded" alt="Product 3">
                    <span class="position-absolute bottom-0 end-0 badge bg-warning text-dark m-2">-20%</span>
                </div>
                <h6 class="mt-3">Product 3</h6>
                <p class="text-muted">$79.99</p>
            </div>
        </div>

        <h5 class="mt-4 mb-3">Profile Image with Status Badge</h5>
        <div class="row">
            <div class="col-md-6">
                <div class="d-flex align-items-center gap-3">
                    <div class="position-relative">
                        <img src="https://via.placeholder.com/80x80" class="rounded-circle" alt="Profile">
                        <span class="position-absolute bottom-0 end-0 p-2 bg-success rounded-circle" style="width: 25px; height: 25px; border: 3px solid white;"></span>
                    </div>
                    <div>
                        <h6>John Doe</h6>
                        <p class="text-muted mb-0">Online</p>
                    </div>
                </div>
            </div>
        </div>

        <h5 class="mt-4 mb-3">Notification Counter</h5>
        <div class="row">
            <div class="col-md-6">
                <div class="position-relative d-inline-block">
                    <button class="btn btn-primary">
                        Messages
                    </button>
                    <span class="position-absolute top-0 start-100 translate-middle badge bg-danger rounded-pill">
                        5
                        <span class="visually-hidden">new messages</span>
                    </span>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
