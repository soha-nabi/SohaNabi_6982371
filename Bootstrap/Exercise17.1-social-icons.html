<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise 17.1 - Social Icons</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
</head>
<body>
    <div class="container mt-5">
        <h1 class="mb-4">Exercise 17.1: Bootstrap Icons</h1>
        
        <h5 class="mt-4 mb-3">Icon Sizes</h5>
        <div class="mb-4">
            <i class="bi bi-heart"></i>
            <i class="bi bi-heart" style="font-size: 1.5rem;"></i>
            <i class="bi bi-heart" style="font-size: 2rem;"></i>
            <i class="bi bi-heart" style="font-size: 3rem;"></i>
        </div>

        <h5 class="mt-4 mb-3">Social Media Icons</h5>
        <div class="mb-4">
            <a href="#" class="me-3 text-dark"><i class="bi bi-facebook" style="font-size: 1.5rem;"></i></a>
            <a href="#" class="me-3 text-dark"><i class="bi bi-twitter" style="font-size: 1.5rem;"></i></a>
            <a href="#" class="me-3 text-dark"><i class="bi bi-instagram" style="font-size: 1.5rem;"></i></a>
            <a href="#" class="me-3 text-dark"><i class="bi bi-linkedin" style="font-size: 1.5rem;"></i></a>
            <a href="#" class="text-dark"><i class="bi bi-github" style="font-size: 1.5rem;"></i></a>
        </div>

        <h5 class="mt-4 mb-3">Colored Icons</h5>
        <div class="mb-4">
            <i class="bi bi-check-circle" style="font-size: 2rem; color: green;"></i>
            <i class="bi bi-exclamation-circle" style="font-size: 2rem; color: orange;"></i>
            <i class="bi bi-x-circle" style="font-size: 2rem; color: red;"></i>
            <i class="bi bi-info-circle" style="font-size: 2rem; color: blue;"></i>
        </div>

        <h5 class="mt-4 mb-3">Common Icons</h5>
        <div class="row">
            <div class="col-md-3 mb-3 text-center">
                <i class="bi bi-search" style="font-size: 2rem;"></i>
                <p class="mt-2">Search</p>
            </div>
            <div class="col-md-3 mb-3 text-center">
                <i class="bi bi-gear" style="font-size: 2rem;"></i>
                <p class="mt-2">Settings</p>
            </div>
            <div class="col-md-3 mb-3 text-center">
                <i class="bi bi-bell" style="font-size: 2rem;"></i>
                <p class="mt-2">Notifications</p>
            </div>
            <div class="col-md-3 mb-3 text-center">
                <i class="bi bi-download" style="font-size: 2rem;"></i>
                <p class="mt-2">Download</p>
            </div>
        </div>

        <h5 class="mt-4 mb-3">Footer with Social Icons</h5>
        <footer class="bg-dark text-white p-4 mt-5 rounded">
            <div class="row align-items-center">
                <div class="col-md-6">
                    <p class="mb-0">&copy; 2026 MyWebsite. All rights reserved.</p>
                </div>
                <div class="col-md-6 text-end">
                    <a href="#" class="me-3 text-white"><i class="bi bi-facebook"></i></a>
                    <a href="#" class="me-3 text-white"><i class="bi bi-twitter"></i></a>
                    <a href="#" class="me-3 text-white"><i class="bi bi-instagram"></i></a>
                    <a href="#" class="text-white"><i class="bi bi-linkedin"></i></a>
                </div>
            </div>
        </footer>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
