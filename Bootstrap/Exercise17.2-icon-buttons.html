<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise 17.2 - Icon Buttons</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
</head>
<body>
    <div class="container mt-5">
        <h1 class="mb-4">Exercise 17.2: Icon-Only Buttons</h1>
        
        <h5 class="mt-4 mb-3">Icon-Only Buttons with Tooltips</h5>
        <div class="mb-4">
            <button class="btn btn-primary" title="Edit"><i class="bi bi-pencil"></i></button>
            <button class="btn btn-success" title="Download"><i class="bi bi-download"></i></button>
            <button class="btn btn-danger" title="Delete"><i class="bi bi-trash"></i></button>
            <button class="btn btn-warning" title="Settings"><i class="bi bi-gear"></i></button>
            <button class="btn btn-info" title="Info"><i class="bi bi-info-circle"></i></button>
        </div>

        <h5 class="mt-4 mb-3">Icon Buttons in Toolbar</h5>
        <div class="btn-group mb-4" role="group">
            <button type="button" class="btn btn-outline-secondary" title="Bold"><i class="bi bi-type-bold"></i></button>
            <button type="button" class="btn btn-outline-secondary" title="Italic"><i class="bi bi-type-italic"></i></button>
            <button type="button" class="btn btn-outline-secondary" title="Underline"><i class="bi bi-type-underline"></i></button>
            <button type="button" class="btn btn-outline-secondary" title="Strikethrough"><i class="bi bi-type-strikethrough"></i></button>
        </div>

        <h5 class="mt-4 mb-3">Icon Buttons in Forms</h5>
        <div class="input-group mb-3">
            <input type="text" class="form-control" placeholder="Search">
            <button class="btn btn-outline-secondary" type="button"><i class="bi bi-search"></i></button>
        </div>

        <h5 class="mt-4 mb-3">Navigation Icons</h5>
        <div class="d-flex gap-3 mb-4">
            <button class="btn btn-link"><i class="bi bi-house" style="font-size: 1.5rem;"></i></button>
            <button class="btn btn-link"><i class="bi bi-person" style="font-size: 1.5rem;"></i></button>
            <button class="btn btn-link"><i class="bi bi-heart" style="font-size: 1.5rem;"></i></button>
            <button class="btn btn-link"><i class="bi bi-chat" style="font-size: 1.5rem;"></i></button>
        </div>

        <h5 class="mt-4 mb-3">Action Button Groups</h5>
        <div class="btn-group" role="group">
            <button type="button" class="btn btn-sm btn-outline-primary"><i class="bi bi-file-earmark-pdf"></i></button>
            <button type="button" class="btn btn-sm btn-outline-primary"><i class="bi bi-file-earmark-excel"></i></button>
            <button type="button" class="btn btn-sm btn-outline-primary"><i class="bi bi-file-earmark-word"></i></button>
            <button type="button" class="btn btn-sm btn-outline-primary"><i class="bi bi-download"></i></button>
            <button type="button" class="btn btn-sm btn-outline-primary"><i class="bi bi-share"></i></button>
        </div>

        <h5 class="mt-4 mb-3">Icon with Text Buttons</h5>
        <div class="mb-4">
            <button class="btn btn-primary"><i class="bi bi-plus-circle"></i> Add New</button>
            <button class="btn btn-success"><i class="bi bi-check"></i> Approve</button>
            <button class="btn btn-warning"><i class="bi bi-exclamation-triangle"></i> Warning</button>
            <button class="btn btn-danger"><i class="bi bi-trash"></i> Delete</button>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
