<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise 3.2 - Grid Classes</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-5">
        <h1 class="mb-4">Exercise 3.2: Bootstrap Grid Classes</h1>
        
        <h5 class="mt-4 mb-3">Container</h5>
        <div class="container-fluid border border-warning p-3 mb-4">
            <p>This is a fluid container (.container-fluid)</p>
        </div>

        <h5 class="mt-4 mb-3">Row with Columns</h5>
        <div class="row mb-4">
            <div class="col border bg-light p-3">Column 1</div>
            <div class="col border bg-light p-3">Column 2</div>
            <div class="col border bg-light p-3">Column 3</div>
        </div>

        <h5 class="mt-4 mb-3">Responsive Columns</h5>
        <div class="row mb-4">
            <div class="col-md-6 border bg-info p-3 text-white mb-2">col-md-6</div>
            <div class="col-md-6 border bg-info p-3 text-white mb-2">col-md-6</div>
        </div>

        <h5 class="mt-4 mb-3">Different Breakpoints</h5>
        <div class="row">
            <div class="col-sm-4 border bg-success p-3 text-white mb-2">col-sm-4</div>
            <div class="col-sm-4 border bg-success p-3 text-white mb-2">col-sm-4</div>
            <div class="col-sm-4 border bg-success p-3 text-white mb-2">col-sm-4</div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
