<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise 5.1 - Alignment Centering</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-5">
        <h1 class="mb-4">Exercise 5.1: Content Alignment</h1>
        
        <h5 class="mt-4 mb-3">Horizontal Center with justify-content-center</h5>
        <div class="row justify-content-center mb-4">
            <div class="col-md-6">
                <div class="card">
                    <div class="card-body">
                        <h5 class="card-title">Centered Column</h5>
                        <p>This column is horizontally centered.</p>
                    </div>
                </div>
            </div>
        </div>

        <h5 class="mt-4 mb-3">Vertical and Horizontal Center</h5>
        <div class="row justify-content-center align-items-center mb-4" style="min-height: 300px; border: 2px solid #dee2e6;">
            <div class="col-md-6 text-center">
                <div class="card">
                    <div class="card-body">
                        <h5 class="card-title">Centered Content</h5>
                        <p>Both horizontally and vertically centered</p>
                    </div>
                </div>
            </div>
        </div>

        <h5 class="mt-4 mb-3">Multiple Items Centered</h5>
        <div class="row justify-content-center align-items-center gap-3 mb-4" style="min-height: 200px;">
            <div class="col-auto">
                <button class="btn btn-primary">Button 1</button>
            </div>
            <div class="col-auto">
                <button class="btn btn-success">Button 2</button>
            </div>
            <div class="col-auto">
                <button class="btn btn-warning">Button 3</button>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
