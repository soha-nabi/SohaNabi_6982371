<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise 6.1 - Navbar Flexbox</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-5">
        <h1 class="mb-4">Exercise 6.1: Responsive Navbar with Flexbox</h1>
        
        <nav class="navbar navbar-expand-md navbar-light bg-light border mb-4">
            <div class="container-fluid">
                <a class="navbar-brand" href="#">Logo</a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarNav">
                    <ul class="navbar-nav ms-auto">
                        <li class="nav-item">
                            <a class="nav-link active" href="#">Home</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="#">About</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="#">Services</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="#">Contact</a>
                        </li>
                    </ul>
                </div>
            </div>
        </nav>

        <h5 class="mt-4 mb-3">Using d-flex, flex-column, and flex-md-row</h5>
        <div class="d-flex flex-column flex-md-row gap-3 mb-4">
            <div class="border p-3 flex-grow-1 bg-light">
                <h6>Item 1</h6>
                <p>Stacks vertically on mobile, horizontally on desktop</p>
            </div>
            <div class="border p-3 flex-grow-1 bg-light">
                <h6>Item 2</h6>
                <p>Uses flexbox utilities</p>
            </div>
            <div class="border p-3 flex-grow-1 bg-light">
                <h6>Item 3</h6>
                <p>Responsive behavior</p>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
