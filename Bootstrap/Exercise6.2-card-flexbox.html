<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise 6.2 - Card Flexbox</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-5">
        <h1 class="mb-4">Exercise 6.2: Card Layout with Flexbox</h1>
        
        <div class="row">
            <div class="col-md-6 mb-4">
                <div class="card h-100">
                    <div class="card-body d-flex justify-content-between align-items-center">
                        <div>
                            <h5 class="card-title">Product Name</h5>
                            <p class="card-text text-muted">High quality item</p>
                        </div>
                        <span class="badge bg-primary">$99</span>
                    </div>
                    <div class="card-footer d-flex justify-content-between">
                        <button class="btn btn-sm btn-outline-primary">Learn More</button>
                        <button class="btn btn-sm btn-primary">Add to Cart</button>
                    </div>
                </div>
            </div>

            <div class="col-md-6 mb-4">
                <div class="card h-100">
                    <div class="card-body d-flex justify-content-between align-items-center">
                        <div>
                            <h5 class="card-title">Another Product</h5>
                            <p class="card-text text-muted">Premium quality</p>
                        </div>
                        <span class="badge bg-success">$149</span>
                    </div>
                    <div class="card-footer d-flex justify-content-between">
                        <button class="btn btn-sm btn-outline-success">Learn More</button>
                        <button class="btn btn-sm btn-success">Add to Cart</button>
                    </div>
                </div>
            </div>
        </div>

        <h5 class="mt-4 mb-3">Vertical Flexbox Layout in Card</h5>
        <div class="card">
            <div class="card-body d-flex flex-column justify-content-center align-items-center" style="min-height: 300px;">
                <h5 class="card-title mb-3">Centered Content</h5>
                <p class="text-center">This content is centered both vertically and horizontally using Flexbox</p>
                <button class="btn btn-primary mt-3">Action Button</button>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
