<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise 9.2 - Button Groups</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-5">
        <h1 class="mb-4">Exercise 9.2: Button Groups and Toggle Buttons</h1>
        
        <h5 class="mt-4 mb-3">Basic Button Group</h5>
        <div class="mb-4">
            <div class="btn-group" role="group" aria-label="Basic button group">
                <button type="button" class="btn btn-outline-primary">Left</button>
                <button type="button" class="btn btn-outline-primary">Middle</button>
                <button type="button" class="btn btn-outline-primary">Right</button>
            </div>
        </div>

        <h5 class="mt-4 mb-3">Button Group with Icons/Text</h5>
        <div class="mb-4">
            <div class="btn-group" role="group" aria-label="Text formatting">
                <button type="button" class="btn btn-outline-secondary">Bold</button>
                <button type="button" class="btn btn-outline-secondary">Italic</button>
                <button type="button" class="btn btn-outline-secondary">Underline</button>
            </div>
        </div>

        <h5 class="mt-4 mb-3">Checkbox Toggle Buttons</h5>
        <div class="mb-4">
            <div class="btn-group" role="group" aria-label="Checkbox buttons">
                <input type="checkbox" class="btn-check" id="option1" autocomplete="off" checked>
                <label class="btn btn-outline-primary" for="option1">Option 1</label>

                <input type="checkbox" class="btn-check" id="option2" autocomplete="off">
                <label class="btn btn-outline-primary" for="option2">Option 2</label>

                <input type="checkbox" class="btn-check" id="option3" autocomplete="off">
                <label class="btn btn-outline-primary" for="option3">Option 3</label>
            </div>
        </div>

        <h5 class="mt-4 mb-3">Radio Toggle Buttons</h5>
        <div class="mb-4">
            <div class="btn-group" role="group" aria-label="Radio buttons">
                <input type="radio" class="btn-check" name="btnradio" id="radio1" autocomplete="off" checked>
                <label class="btn btn-outline-success" for="radio1">Active</label>

                <input type="radio" class="btn-check" name="btnradio" id="radio2" autocomplete="off">
                <label class="btn btn-outline-success" for="radio2">Inactive</label>

                <input type="radio" class="btn-check" name="btnradio" id="radio3" autocomplete="off">
                <label class="btn btn-outline-success" for="radio3">Disabled</label>
            </div>
        </div>

        <h5 class="mt-4 mb-3">Vertical Button Group</h5>
        <div class="mb-4">
            <div class="btn-group-vertical" role="group" aria-label="Vertical button group">
                <button type="button" class="btn btn-outline-info">Top</button>
                <button type="button" class="btn btn-outline-info">Middle</button>
                <button type="button" class="btn btn-outline-info">Bottom</button>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
